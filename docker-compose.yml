version: "3.9"

services:
  # ============================================================
  # SurrealDB
  # ============================================================
  surrealdb:
    image: surrealdb/surrealdb:latest
    command: start --log info --user root --pass root file://data/database.db
    ports:
      - "8000:8000"
    volumes:
      - ./data/surreal:/data
    restart: unless-stopped

  # ============================================================
  # Outline Wiki + Dependencies
  # ============================================================
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: outline
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: outline_pass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    restart: unless-stopped

  outline:
    image: outlinewiki/outline:latest
    env_file: .env.outline
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  # ============================================================
  # MedDevice DMS Bot
  # ============================================================
  bot:
    build: .
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./db:/app/db
    depends_on:
      - surrealdb
      - outline
    restart: unless-stopped
    ports:
      - "8080:8080"
